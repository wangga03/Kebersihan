<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEBERSIHAN PPMRJ</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative;}
        h1, h2 { text-align: center; color: #2c3e50; }
        h1 { border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .section-title { background-color: #2c3e50; color: white; padding: 10px; border-radius: 6px; margin-top: 30px; margin-bottom: 15px; text-align: center; }
        .flex-row { display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .box { flex: 1; min-width: 300px; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fdfdfd; }
        .box h3 { margin-top: 0; text-align: center; color: #444; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: monospace; font-size: 14px; resize: vertical;}
        
        /* Database Section */
        .db-section { background: #f3e5f5; padding: 15px; border-radius: 8px; border: 1px solid #ce93d8; margin-bottom: 20px; text-align: center;}
        .db-info { font-weight: bold; color: #6a1b9a; margin-bottom: 10px; font-size: 1.1em;}
        
        /* Universal Quota Section */
        .kuota-section { background: #e8f8f5; padding: 15px; border-radius: 8px; border: 1px solid #1abc9c; margin-bottom: 25px; }
        .kuota-title { font-weight: bold; color: #16a085; border-bottom: 2px solid #1abc9c; display: inline-block; margin-bottom: 10px; }
        .kuota-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .kuota-item { background: #fff; padding: 8px; border-radius: 6px; border: 1px solid #bdc3c7; text-align: center; display: flex; flex-direction: column; justify-content: space-between; position: relative;}
        .kuota-item label { font-size: 0.85em; font-weight: bold; color: #2c3e50; margin-bottom: 2px; line-height: 1.2; padding-right: 15px;}
        .kuota-item small { color: #e67e22; font-size: 0.8em; display: block; margin-bottom: 5px;}
        .kuota-item input { width: 50px; padding: 4px; text-align: center; font-weight: bold; border: 2px solid #3498db; border-radius: 4px; margin: 0 auto; }
        .btn-delete-task { position: absolute; top: 4px; right: 4px; background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 12px; padding: 2px; }

        /* Buttons */
        .btn-container { text-align: center; margin: 25px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;}
        button { border: none; padding: 10px 16px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; color: white; }
        .btn-utama { background-color: #27ae60; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.4); font-size: 18px; padding: 15px 30px;}
        .btn-pdf { background-color: #e74c3c; } .btn-pdf:hover { background-color: #c0392b; }
        .btn-db { background-color: #8e44ad; color: #fff;} .btn-history { background-color: #34495e; }

        /* Output Area Items */
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 4px; border-radius: 4px; gap: 10px;}
        .person-info { flex:1; display: flex; align-items: center; gap: 10px; }
        .person-name { font-weight: bold; width: 130px; display: inline-block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .lorong-tag { font-size: 0.8em; padding: 2px 6px; border-radius: 4px; color: white; background: #95a5a6; }
        .task-select { padding: 4px 8px; border-radius: 4px; border: 1px solid #bdc3c7; background: #ecf0f1; font-weight: bold; cursor: pointer; outline: none; }

        /* Modal & History */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 3% auto; padding: 25px; border-radius: 8px; width: 90%; max-width: 1000px; max-height: 90vh; overflow-y: auto; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        details.history-month { background: #fdfdfd; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 15px; padding: 15px; }
        details.history-month summary { font-size: 1.2em; font-weight: bold; color: #2980b9; cursor: pointer; outline: none; display: flex; justify-content: space-between; align-items: center; }
        .history-data { display: flex; gap: 20px; margin-top: 15px; flex-wrap: wrap;}
        .history-col { flex: 1; min-width: 300px; }
        .history-task-title { color: #e67e22; border-bottom: 1px solid #ccc; margin-top: 12px; margin-bottom: 6px; font-weight: bold; font-size: 1.1em; }
        
        /* Presensi Styles */
        .history-person { padding: 8px 0; border-bottom: 1px dashed #eee; display: flex; flex-direction: column; gap: 6px;}
        .person-header { display: flex; justify-content: space-between; align-items: center; }
        .badge-presensi { font-size: 0.8em; padding: 3px 8px; border-radius: 12px; font-weight: bold; color: white; min-width: 65px; text-align: center;}
        .badge-hadir { background-color: #27ae60; }
        .badge-alfa { background-color: #e74c3c; }
        .badge-izin { background-color: #f1c40f; color: #333; }
        .badge-null { background-color: #95a5a6; }
        .presensi-select { font-size: 0.85em; padding: 4px; border-radius: 4px; border: 1px solid #ccc; width: 100%; }

        .btn-del-doc { background: #7f8c8d; font-size: 0.75em; padding: 5px 10px; }
        .btn-print-history { background: #e74c3c; font-size: 0.75em; padding: 5px 10px; margin-right: 5px; }

        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print, .close-btn, .btn-del-doc, .btn-print-history, .presensi-select { display: none !important; }
            .modal { position: relative; display: block; background: none; }
            .modal-content { box-shadow: none; margin: 0; padding: 0; width: 100%; max-width: 100%; max-height: none; }
            details.history-month { border: none; padding: 0; display: block !important; }
            details.history-month summary { display: block; border-bottom: 2px solid #000; margin-bottom: 10px; }
            details.history-month summary span::after { content: " - LAPORAN KEBERSIHAN"; }
            .history-data { display: flex; flex-direction: row; flex-wrap: nowrap; gap: 30px; }
            .history-col { min-width: 0; }
            .history-person { border-bottom: 1px solid #eee; padding: 4px 0; }
            .badge-presensi { border: 1px solid #000; color: #000 !important; background: none !important; }
            .warning-tag { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h1>KEBERSIHAN PPMRJ</h1>
        
        <div class="db-section">
            <h3>💾 Manajemen Riwayat</h3>
            <div class="db-info" id="dbStatus">Memuat Database... ⏳</div>
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button class="btn-db" onclick="simpanKeFirestore()">📌 Simpan Riwayat</button>

        </div>

        <div class="kuota-section">
            <h3 style="margin-top: 0; text-align: center; color: #16a085;">⚙️ Edit Kuota Maksimal</h3>
            <div class="kuota-title">👨 Cowok</div>

                    <option value="cowok">Cowok</option>
                    <option value="cewek">Cewek</option>

        <div class="btn-container">
            <button class="btn-utama" onclick="prosesSemua()">🎲 Acak & Plot Sekarang</button>

        </div>
    </div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <span class="close-btn no-print" onclick="tutupRiwayatModal()">&times;</span>
        <h2 style="margin-top: 0; color:#2c3e50;" class="no-print">📖 Riwayat & Presensi Bulanan</h2>
        <div id="historyContainer"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB9d5uK44dBsEmEsmtT5zHOA5NaPbNFiLY",
        authDomain: "project-iot2-a1c92.firebaseapp.com",
        projectId: "project-iot2-a1c92",
        storageBucket: "project-iot2-a1c92.firebasestorage.app",
        messagingSenderId: "674902263928",
        appId: "1:674902263928:web:1b961b9a6d4641d366458d"
    };
    
    firebase.initializeApp(firebaseConfig);
    const dbFirestore = firebase.firestore();

    let appHistory = []; 
    let state = {
        cowok: [], cewek: [],
        tasksCowok: ['Membersihkan Lorong', 'Kamar Mandi', 'Tangga Cowok', 'Balkon', 'Dapur', 'Ruang Wifi', 'Mesin Cuci'],
        tasksCewek: ['Tangga Cewek', 'Masjid Lantai 1', 'Masjid Lantai 2', 'Dapur Cewek', 'Ruang Wifi Cewek']
    };

    let defaultQuotas = { 'Membersihkan Lorong': 1, 'Kamar Mandi': 8, 'Tangga Cewek': 1 };

    window.onload = function() { muatDariFirestore(); renderKuotaInputs(); };

    function muatDariFirestore() {
        dbFirestore.collection("wgg_riwayat").orderBy("id", "asc").onSnapshot((querySnapshot) => {
            appHistory = [];
            querySnapshot.forEach((doc) => {
                let data = doc.data(); data.docId = doc.id;
                appHistory.push(data);
            });
            updateDbStatus();
        });
    }

    function updateDbStatus() {
        document.getElementById('dbStatus').innerHTML = `Tersinkronisasi ☁️ | Riwayat: ${appHistory.length} Bulan`;
    }

    function simpanKeFirestore() {
        if(state.cowok.length === 0 && state.cewek.length === 0) return alert("Acak dulu sebelum simpan!");
        let label = prompt("Nama bulan (Contoh: Mei 2026):");
        if(!label) return;
        
        let cowokAbs = state.cowok.map(p => ({...p, presensi: null}));
        let cewekAbs = state.cewek.map(p => ({...p, presensi: null}));

        dbFirestore.collection("wgg_riwayat").add({
            id: new Date().getTime(), label: label,
            cowok: cowokAbs, cewek: cewekAbs
        }).then(() => alert(`Tersimpan!`));
    }

    function updatePresensi(docId, gender, personIdx, value) {
        let doc = appHistory.find(d => d.docId === docId);
        if(!doc) return;
        doc[gender][personIdx].presensi = value;
        dbFirestore.collection("wgg_riwayat").doc(docId).update({ [gender]: doc[gender] });
    }

    function cetakRiwayat() { window.print(); }

    function bukaRiwayatModal() {
        let container = document.getElementById('historyContainer');
        container.innerHTML = '';
        if(appHistory.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#888;">Kosong.</p>';
        } else {
            [...appHistory].reverse().forEach(record => {
                let html = `<details class="history-month" open>
                                <summary>
                                    <span>${record.label}</span>
                                    <div class="no-print">
                                        <button class="btn-print-history" onclick="cetakRiwayat()">📄 Cetak Riwayat (PDF)</button>
                                        <button class="btn-del-doc" onclick="hapusDokumen('${record.docId}')">🗑️ Hapus</button>
                                    </div>
                                </summary>
                                <div class="history-data">`;
                
                ['cowok', 'cewek'].forEach(gender => {
                    html += `<div class="history-col"><h3 style="color:${gender==='cowok'?'#2980b9':'#e91e63'};">${gender.toUpperCase()}</h3>`;
                    let grouped = {};
                    record[gender].forEach((p, idx) => { 
                        if(!grouped[p.tugas]) grouped[p.tugas] = []; 
                        grouped[p.tugas].push({...p, oIdx: idx}); 
                    });
                    
                    Object.keys(grouped).forEach(tugas => {
                        html += `<div class="history-task-title">${tugas}</div>`;
                        grouped[tugas].forEach(p => {
                            let pClass = p.presensi ? `badge-${p.presensi.toLowerCase()}` : 'badge-null';
                            let pText = p.presensi || 'Pilih...';
                            html += `
                                <div class="history-person">
                                    <div class="person-header">
                                        <span><b>${p.nama}</b> <small class="lorong-tag">${p.lorong}</small></span>
                                        <span class="badge-presensi ${pClass}">${p.presensi || '-'}</span>
                                    </div>
                                    <select class="presensi-select no-print" onchange="updatePresensi('${record.docId}', '${gender}', ${p.oIdx}, this.value)">
                                        <option value="" disabled ${!p.presensi?'selected':''}>Set Presensi...</option>
                                        <option value="Hadir" ${p.presensi==='Hadir'?'selected':''}>Hadir</option>
                                        <option value="Alfa" ${p.presensi==='Alfa'?'selected':''}>Alfa</option>
                                        <option value="Izin" ${p.presensi==='Izin'?'selected':''}>Izin</option>
                                    </select>
                                </div>`;
                        });
                    });
                    html += `</div>`;
                });
                container.innerHTML += html + `</div></details>`;
            });
        }
        document.getElementById('historyModal').style.display = 'block';
    }

    function hapusDokumen(id) { if(confirm("Hapus?")) dbFirestore.collection("wgg_riwayat").doc(id).delete(); }
    function tutupRiwayatModal() { document.getElementById('historyModal').style.display = 'none'; }

    // --- LOGIKA PLOTING ---
    function renderKuotaInputs() {
        let old = {}; document.querySelectorAll('.kuota-grid input').forEach(i => old[i.id] = i.value);
        let cc = document.getElementById('kuotaContainerCowok'); cc.innerHTML = '';
        state.tasksCowok.forEach(t => {
            let id = 'q_cowok_' + t.replace(/[^a-zA-Z0-9]/g, '_');
            cc.innerHTML += `<div class="kuota-item"><button class="btn-delete-task" onclick="hapusTugas('cowok','${t}')">❌</button><label>${t}</label><input type="number" id="${id}" value="${defaultQuotas[t]||99}"></div>`;
        });
        let cw = document.getElementById('kuotaContainerCewek'); cw.innerHTML = '';
        state.tasksCewek.forEach(t => {
            let id = 'q_cewek_' + t.replace(/[^a-zA-Z0-9]/g, '_');
            cw.innerHTML += `<div class="kuota-item"><button class="btn-delete-task" onclick="hapusTugas('cewek','${t}')">❌</button><label>${t}</label><input type="number" id="${id}" value="${defaultQuotas[t]||99}"></div>`;
        });
        document.querySelectorAll('.kuota-grid input').forEach(i => { if(old[i.id]) i.value = old[i.id]; });
    }

    function tambahTugasDinamis() {
        let n = document.getElementById('customTaskName').value.trim();
        let g = document.getElementById('customTaskGender').value;
        if(n) { state[g==='cowok'?'tasksCowok':'tasksCewek'].push(n); renderKuotaInputs(); document.getElementById('customTaskName').value=''; }
    }

    function hapusTugas(g,t) { state[g==='cowok'?'tasksCowok':'tasksCewek'] = state[g==='cowok'?'tasksCowok':'tasksCewek'].filter(x=>x!==t); renderKuotaInputs(); }
    function getQuota(g, t) { let e = document.getElementById(`q_${g}_${t.replace(/[^a-zA-Z0-9]/g, '_')}`); return e ? parseInt(e.value) : 99; }

    function cekCooldown(n, t, g) {
        let look = g === 'cowok' ? 5 : 3;
        let hist = appHistory.slice(-look);
        for(let r of hist) { if(r[g] && r[g].find(p => p.nama === n && p.tugas === t)) return false; }
        return true;
    }

    function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

    function prosesSemua() {
        document.getElementById('judulHasil').style.display = 'block';
        state.cowok = plot('cowok', 'inputCowok');
        state.cewek = plot('cewek', 'inputCewek');
        render('outputCowok', state.cowok, state.tasksCowok, 'cowok');
        render('outputCewek', state.cewek, state.tasksCewek, 'cewek');
    }

    function plot(gender, inputId) {
        let lines = document.getElementById(inputId).value.trim().split('\n');
        let data = {}; lines.forEach(l => { let p = l.split(','); if(p[1]) { let lr = p[0].trim(); if(!data[lr]) data[lr]=[]; data[lr].push(p[1].trim()); } });
        
        let res = [], idC = 1;
        let spotK = state[gender==='cowok'?'tasksCowok':'tasksCewek'].filter(t => !['Membersihkan Lorong','Kamar Mandi','Tangga Cewek'].includes(t));
        let counts = {}; spotK.forEach(s => counts[s] = 0);
        let shuffledS = shuffle([...spotK]);

        Object.keys(data).forEach((lorong, idx) => {
            let names = shuffle([...data[lorong]]);
            let targetSpot = shuffledS[idx % shuffledS.length];

            // Rule: Membersihkan Lorong (Cowok)
            if(gender === 'cowok' && state.tasksCowok.includes('Membersihkan Lorong')) {
                for(let i=0; i<getQuota('cowok','Membersihkan Lorong'); i++) if(names.length) {
                    let n = names.shift(); res.push({id: idC++, nama: n, lorong, tugas: 'Membersihkan Lorong', terpaksa: !cekCooldown(n,'Membersihkan Lorong','cowok')});
                }
            }
            // Rule: Tangga Cewek (L1 & L2)
            if(gender === 'cewek' && (lorong==='Lorong 1'||lorong==='Lorong 2') && state.tasksCewek.includes('Tangga Cewek')) {
                for(let i=0; i<getQuota('cewek','Tangga Cewek'); i++) if(names.length) {
                    let n = names.shift(); res.push({id: idC++, nama: n, lorong, tugas: 'Tangga Cewek', terpaksa: !cekCooldown(n,'Tangga Cewek','cewek')});
                }
            }
            // Sisa sebar ke Spot Khusus
            while(names.length) {
                let t = targetSpot;
                if(counts[t] >= getQuota(gender, t)) {
                    let av = spotK.filter(s => counts[s] < getQuota(gender, s));
                    if(av.length) { av.sort((a,b)=>counts[a]-counts[b]); t = av[0]; }
                }
                let n = names.shift();
                res.push({id: idC++, nama: n, lorong, tugas: t, terpaksa: !cekCooldown(n, t, gender)});
                if(counts[t] !== undefined) counts[t]++;
            }
        });
        return res;
    }

    function render(id, data, tasks, g) {
        let c = document.getElementById(id); c.innerHTML = '';
        let grouped = {}; tasks.forEach(t => grouped[t] = []);
        data.forEach(p => { if(!grouped[p.tugas]) grouped[p.tugas]=[]; grouped[p.tugas].push(p); });
        tasks.forEach(t => {
            let nms = grouped[t]; if(!nms.length) return;
            let html = `<div class="list-group"><div class="list-title">${t} (${nms.length})</div><ul class="item-list">`;
            nms.forEach(m => {
                let ops = tasks.map(o => `<option value="${o}" ${o===m.tugas?'selected':''}>${o}</option>`).join('');
                html += `<li class="item-row"><div class="person-info"><span class="person-name">${m.nama} ${m.terpaksa?'⚠️':''}</span><span class="lorong-tag">${m.lorong}</span></div>
                        <div class="action-edit"><select class="task-select" onchange="editMan('${g}',${m.id},this.value)">${ops}</select></div></li>`;
            });
            c.innerHTML += html + '</ul></div>';
        });
    }

    function editMan(g, id, v) { let p = state[g].find(x=>x.id===id); if(p){ p.tugas=v; p.terpaksa=false; render(g==='cowok'?'outputCowok':'outputCewek', state[g], state[g==='cowok'?'tasksCowok':'tasksCewek'], g); } }
</script>

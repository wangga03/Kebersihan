<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEBERSIHAN PPMRJ</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 10px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative;}
        
        /* Admin Security UI */
        .admin-controls { position: absolute; top: 20px; right: 20px; z-index: 100; }
        #btnLogin { background: #34495e; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
        #btnLogout { background: #e74c3c; padding: 8px 15px; border-radius: 6px; cursor: pointer; display: none; }
        .admin-only { display: none; }

        .ppm-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; background: #eee; padding: 10px; border-radius: 50px; }
        .nav-btn { background: #95a5a6; border-radius: 25px; padding: 10px 30px; font-size: 1.1em; color: white; cursor: pointer; transition: 0.3s; border: none; }
        .nav-btn.active { background: #3498db; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.4); transform: scale(1.05); }

        h1, h2, h3 { text-align: center; color: #2c3e50; margin-bottom: 20px;}
        h1 { border-bottom: 2px solid #3498db; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; font-size: 1.5rem; margin-top: 0; padding-right: 120px; }
        
        .flex-row { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .box { flex: 1; min-width: 300px; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fdfdfd; }
        button { border: none; padding: 10px 15px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
        input, select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; outline: none; }

        .manage-section { background: #f8fbff; border: 1px solid #3498db; }
        .lorong-card { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: left; }
        .lorong-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 8px; }
        .member-chip { display: inline-flex; align-items: center; background: #eef2f3; padding: 5px 12px; border-radius: 20px; margin: 3px; font-size: 0.85em; border: 1px solid #ccc; }
        .btn-del-mini { background: none; color: #e74c3c; padding: 0 0 0 8px; font-size: 16px; cursor: pointer; border: none; font-weight: bold;}

        .db-section { background: #f3e5f5; border: 1px solid #ce93d8; text-align: center; margin-bottom: 20px; padding: 15px; border-radius: 8px; }
        .kuota-section { background: #e8f8f5; border: 1px solid #1abc9c; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .kuota-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 10px 0; }
        .kuota-item { background: #fff; padding: 8px; border-radius: 6px; border: 1px solid #bdc3c7; text-align: center; position: relative;}
        .btn-del-task { position: absolute; top: 2px; right: 2px; color: red; font-size: 12px; cursor: pointer; background:none; border:none;}

        .list-group { margin-bottom: 15px; background: rgba(255,255,255,0.7); padding: 10px; border-radius: 6px; border: 1px solid #ddd; text-align: left; }
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 4px; border-radius: 4px; flex-wrap: wrap; gap: 10px; }
        .lorong-tag { font-size: 0.75em; padding: 2px 6px; border-radius: 4px; color: white; background: #95a5a6; }

        .badge-presensi { font-size: 0.75em; padding: 4px 10px; border-radius: 12px; font-weight: bold; color: white; min-width: 70px; text-align: center; display: inline-block;}
        .badge-hadir { background-color: #27ae60; }
        .badge-alfa { background-color: #e74c3c; }
        .badge-izin { background-color: #f1c40f; color: #333; }
        .badge-absen { background-color: #95a5a6; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: #fff; margin: 2% auto; padding: 20px; border-radius: 8px; width: 95%; max-width: 1000px; max-height: 90vh; overflow-y: auto; }
        details.history-month { background: #fdfdfd; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 15px; padding: 15px; }
        details.history-month summary { font-size: 1.1em; font-weight: bold; color: #2980b9; cursor: pointer; display: flex; justify-content: space-between; align-items: center; list-style: none;}
        .history-task-group { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee; }
        .history-task-title { font-weight: bold; color: #e67e22; border-bottom: 1px solid #ddd; margin-bottom: 8px; display: block; font-size: 0.9em;}
        
        .sync-status { font-size: 0.8em; font-style: italic; color: #27ae60; margin-top: 5px; display: none;}

        @media (max-width: 600px) { .flex-row { flex-direction: column; } h1 { padding-right: 10px; margin-top: 40px;} }
        @media print {
            @page { margin: 1.5cm; }
            body * { visibility: hidden; }
            #historyModal, #historyModal * { visibility: visible; }
            #historyModal { position: absolute; left: 0; top: 0; width: 100%; display: block !important; }
            .no-print, .close-btn, button, select, .admin-controls { display: none !important; }
            .badge-presensi { border: 1px solid #000; color: #000 !important; background: none !important; }
            details.history-month summary span::after { content: " - LAPORAN KEBERSIHAN"; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-controls no-print">
        <button id="btnLogin" onclick="loginAdmin()">🔒 Login Admin</button>
        <button id="btnLogout" onclick="logoutAdmin()">🔓 Logout</button>
    </div>

    <div class="no-print">
        <h1>KEBERSIHAN PPMRJ</h1>
        <div class="ppm-nav">
            <div id="btnPpm1" class="nav-btn active" onclick="switchPPM(1)">PPM 1</div>
            <div id="btnPpm2" class="nav-btn" onclick="switchPPM(2)">PPM 2</div>
        </div>
        
        <div class="db-section">
            <div id="dbStatus" style="font-weight:bold; margin-bottom:10px; color:#6a1b9a;">Mode View: PPM 1</div>
            <div id="autoSyncMsg" class="sync-status">✓ Cloud Terupdate</div>
            <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px;">
                <button class="admin-only" style="background:#8e44ad;" onclick="simpanRiwayatPenugasan()">📌 Simpan Riwayat</button>
                <button style="background:#34495e;" onclick="bukaRiwayatModal()">📖 Lihat Riwayat & Presensi</button>
                <button class="admin-only" style="background:#7f8c8d; font-size: 0.8em;" onclick="resetToDefault()">🔄 Reset Anggota Tab Ini</button>
            </div>
        </div>

        <div id="viewModeNotice" style="text-align:center; color:#888; padding:10px;">Silakan login untuk mengedit anggota/kuota.</div>

        <div class="admin-only">
            <div class="flex-row">
                <div class="box manage-section">
                    <h3>Kelola Anggota Cowok (PPM <span class="labelNav">1</span>)</h3>
                    <div id="manageCowok"></div>
                    <div style="display:flex; gap:5px; margin-top:10px;"><input type="text" id="newLorongCowok" placeholder="Lorong..."><button style="background:#2980b9;" onclick="addLorong('cowok')">+</button></div>
                </div>
                <div class="box manage-section" style="border-color: #e91e63;">
                    <h3>Kelola Anggota Cewek (PPM <span class="labelNav">1</span>)</h3>
                    <div id="manageCewek"></div>
                    <div style="display:flex; gap:5px; margin-top:10px;"><input type="text" id="newLorongCewek" placeholder="Lorong..."><button style="background:#e91e63;" onclick="addLorong('cewek')">+</button></div>
                </div>
            </div>

            <div class="kuota-section">
                <h3>⚙️ Edit Kuota & Spot (PPM <span class="labelNav">1</span>)</h3>
                <div class="kuota-grid" id="kuotaCowok"></div>
                <div class="kuota-grid" id="kuotaCewek"></div>
                <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px;">
                    <input type="text" id="customTask" placeholder="Spot Baru..."><select id="customGender"><option value="cowok">Cowok</option><option value="cewek">Cewek</option></select><button style="background:#3498db;" onclick="addCustomTask()">+ Spot</button>
                </div>
            </div>

            <div class="btn-container"><button style="background:#27ae60; font-size:18px; padding:15px 30px; width:100%;" onclick="prosesSemua()">🎲 Acak & Plot Sekarang</button></div>
        </div>
    </div>

    <h2 id="judulHasil" style="display:none; margin-top:30px;">Hasil Ploting Bulan Ini</h2>
    <div class="flex-row">
        <div class="box results-cowok" id="outCowok"></div>
        <div class="box results-cewek" id="outCewek"></div>
    </div>
</div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <span class="no-print" style="float:right; cursor:pointer; font-size:28px; font-weight:bold; color: #aaa;" onclick="tutupRiwayatModal()">&times;</span>
        <h2 id="historyTitle">📖 Riwayat PPM 1</h2>
        <div id="historyContainer"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB9d5uK44dBsEmEsmtT5zHOA5NaPbNFiLY",
        authDomain: "project-iot2-a1c92.firebaseapp.com",
        projectId: "project-iot2-a1c92",
        storageBucket: "project-iot2-a1c92.firebasestorage.app",
        messagingSenderId: "674902263928",
        appId: "1:674902263928:web:1b961b9a6d4641d366458d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const initialMembers = {
        cowok: { "Lorong 1": ["Faiz", "Fariz", "Aris", "Royan", "Rasya"], "Lorong 2": ["Zaed", "Ubay", "Rizqo", "Gio", "Alva", "Duhan", "Dito", "Agoy"], "Lorong 3": ["harsa", "Danu", "Alka", "Fadzlan", "Ikhwan", "Adit"], "Lorong 4": ["Syafiq", "Rio", "Gifran", "Radit", "Affan", "Movic", "Kenzi"], "Lorong 5": ["c", "Reza", "Malvin", "Dika", "Fandi", "Ibam", "Ipul", "Denu"] },
        cewek: { "Lorong 1": ["Insyal", "Caca", "Febi", "Dila", "Nisna", "Alya", "Agnia", "Ifra", "Dilan", "Mimin"], "Lorong 2": ["Nayla", "Dea", "Dini", "Putri", "Damai", "Chelsea", "Ayu", "Kania", "Askia", "Aurel"], "Lorong 3": ["Ara", "Una", "Yuta", "Yaya", "Najwa"] }
    };
    const initialTasks = { cowok: ['Membersihkan Lorong', 'Kamar Mandi', 'Tangga Cowok', 'Balkon', 'Dapur', 'Ruang Wifi', 'Mesin Cuci'], cewek: ['Tangga Cewek', 'Masjid Lantai 1', 'Masjid Lantai 2', 'Dapur Cewek', 'Ruang Wifi Cewek'] };

    let currentPPM = 1, appHistory = [], memberData = {}, tasks = {}, quotas = {}, state = { cowok: [], cewek: [] };
    let isAdmin = localStorage.getItem('ppm_admin') === 'true';

    window.onload = () => { checkAdminStatus(); switchPPM(1); };

    // --- SECURE LOGIN LOGIC ---
    async function loginAdmin() {
        let inputPass = prompt("Masukkan Password Admin:");
        if(!inputPass) return;
        try {
            const authDoc = await db.collection("wgg_auth").doc("admin_pass").get();
            if(authDoc.exists && inputPass === authDoc.data().password) {
                isAdmin = true;
                localStorage.setItem('ppm_admin', 'true');
                checkAdminStatus();
                alert("Login Berhasil!");
            } else { alert("Password Salah!"); }
        } catch(e) { alert("Error verifikasi Cloud."); }
    }

    function logoutAdmin() {
        isAdmin = false;
        localStorage.setItem('ppm_admin', 'false');
        checkAdminStatus();
    }

    function checkAdminStatus() {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
        document.getElementById('viewModeNotice').style.display = isAdmin ? 'none' : 'block';
        document.getElementById('btnLogin').style.display = isAdmin ? 'none' : 'block';
        document.getElementById('btnLogout').style.display = isAdmin ? 'block' : 'none';
        renderManage(); renderKuota();
    }

    async function switchPPM(num) {
        currentPPM = num;
        document.getElementById('btnPpm1').classList.toggle('active', num === 1);
        document.getElementById('btnPpm2').classList.toggle('active', num === 2);
        document.querySelectorAll('.labelNav').forEach(el => el.innerText = num);
        document.getElementById('dbStatus').innerText = `Mode: PPM ${num} ${isAdmin ? '(Admin)' : '(View)'}`;
        document.getElementById('historyTitle').innerText = `📖 Riwayat PPM ${num}`;
        await loadAllFromCloud();
        muatHistory();
    }

    async function loadAllFromCloud() {
        const doc = await db.collection("wgg_settings").doc(`config_ppm${currentPPM}`).get();
        if (doc.exists) {
            const cloud = doc.data(); memberData = cloud.memberData; tasks = cloud.tasks; quotas = cloud.quotas;
        } else {
            memberData = (currentPPM === 1) ? JSON.parse(JSON.stringify(initialMembers)) : { cowok: {}, cewek: {} };
            tasks = JSON.parse(JSON.stringify(initialTasks)); quotas = {};
            tasks.cowok.forEach(t => quotas[`cowok_${t}`] = 99); tasks.cewek.forEach(t => quotas[`cewek_${t}`] = 99);
            if(isAdmin) await saveToCloud();
        }
        renderManage(); renderKuota();
    }

    async function saveToCloud() {
        if(!isAdmin) return;
        document.getElementById('autoSyncMsg').style.display = 'block';
        await db.collection("wgg_settings").doc(`config_ppm${currentPPM}`).set({ memberData, tasks, quotas });
        setTimeout(() => document.getElementById('autoSyncMsg').style.display = 'none', 2000);
    }

    function resetToDefault() { if(confirm(`Reset data PPM ${currentPPM}?`)) { memberData = JSON.parse(JSON.stringify(initialMembers)); saveToCloud().then(() => renderManage()); } }

    function renderManage() {
        ['cowok', 'cewek'].forEach(g => {
            const container = document.getElementById('manage' + g.charAt(0).toUpperCase() + g.slice(1));
            container.innerHTML = '';
            const sorted = Object.keys(memberData[g] || {}).sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));
            sorted.forEach(l => {
                let html = `<div class="lorong-card"><div class="lorong-header"><b>${l}</b>${isAdmin?`<button class="btn-del-mini" onclick="delLorong('${g}','${l}')">🗑️</button>`:''}</div><div>`;
                (memberData[g][l] || []).forEach((n, idx) => { html += `<span class="member-chip">${n}${isAdmin?`<button class="btn-del-mini" onclick="delMember('${g}','${l}',${idx})">×</button>`:''}</span>`; });
                html += `</div>${isAdmin?`<div style="margin-top:8px; display:flex; gap:5px;"><input type="text" id="in-${g}-${l}" placeholder="Nama..."><button style="background:#27ae60;" onclick="addMember('${g}','${l}')">+</button></div>`:''}</div>`;
                container.innerHTML += html;
            });
        });
    }

    function addLorong(g) { let i = document.getElementById('newLorong'+g.charAt(0).toUpperCase()+g.slice(1)); if(i.value.trim()){ memberData[g][i.value.trim()] = []; renderManage(); i.value=''; saveToCloud(); } }
    function delLorong(g, l) { if(confirm('Hapus '+l+'?')) { delete memberData[g][l]; renderManage(); saveToCloud(); } }
    function addMember(g, l) { let i = document.getElementById(`in-${g}-${l}`); if(i.value.trim()){ memberData[g][l].push(i.value.trim()); renderManage(); i.value = ''; saveToCloud(); } }
    function delMember(g, l, idx) { memberData[g][l].splice(idx, 1); renderManage(); saveToCloud(); }

    function renderKuota() {
        ['cowok','cewek'].forEach(g => {
            let cont = document.getElementById('kuota'+g.charAt(0).toUpperCase()+g.slice(1));
            cont.innerHTML = ''; (tasks[g] || []).forEach(t => {
                let key = `${g}_${t}`, val = quotas[key] || 99;
                cont.innerHTML += `<div class="kuota-item">${isAdmin?`<button class="btn-del-task" onclick="delTask('${g}','${t}')">×</button>`:''}<label style="font-size:0.7em; display:block;">${t}</label><input type="number" ${!isAdmin?'disabled':''} onchange="updateQuota('${key}', this.value)" value="${val}" style="width:50px;"></div>`;
            });
        });
    }
    function updateQuota(k, v) { quotas[k] = parseInt(v); saveToCloud(); }
    function addCustomTask() { let v = document.getElementById('customTask').value.trim(), g = document.getElementById('customGender').value; if(v){ tasks[g].push(v); quotas[`${g}_${v}`] = 99; renderKuota(); document.getElementById('customTask').value=''; saveToCloud(); } }
    function delTask(g, t) { if(confirm('Hapus '+t+'?')) { tasks[g] = tasks[g].filter(x => x!==t); delete quotas[`${g}_${t}`]; renderKuota(); saveToCloud(); } }

    function muatHistory() { db.collection(`history_ppm${currentPPM}`).orderBy("id", "asc").onSnapshot(snap => { appHistory = snap.docs.map(doc => ({ docId: doc.id, ...doc.data() })); }); }
    
    function simpanRiwayatPenugasan() {
        if (!state.cowok.length) return alert("Acak dulu!");
        let label = prompt(`Label Riwayat?`, "Mei 2026"); if (!label) return;
        db.collection(`history_ppm${currentPPM}`).add({ id: Date.now(), label, cowok: state.cowok.map(p => ({ ...p, presensi: null })), cewek: state.cewek.map(p => ({ ...p, presensi: null })) }).then(() => alert("Tersimpan!"));
    }

    function updatePresensi(docId, g, idx, val) {
        if(!isAdmin) return alert("Admin Only!");
        let doc = appHistory.find(d => d.docId === docId); doc[g][idx].presensi = val;
        const b = document.getElementById(`badge-${docId}-${g}-${idx}`); if (b) { b.className = `badge-presensi badge-${val.toLowerCase()}`; b.innerText = val; }
        db.collection(`history_ppm${currentPPM}`).doc(docId).update({ [g]: doc[g] });
    }

    function bukaRiwayatModal() {
        let cont = document.getElementById('historyContainer'); cont.innerHTML = appHistory.length ? '' : '<p>Kosong.</p>';
        [...appHistory].reverse().forEach(record => {
            let html = `<details class="history-month" open><summary><span>${record.label}</span><div class="no-print"><button style="background:#e74c3c; font-size:0.75em;" onclick="window.print()">📄 PDF</button>${isAdmin?`<button style="background:#7f8c8d; font-size:0.75em; margin-left:5px;" onclick="hapusDokumen('${record.docId}')">🗑️ Hapus</button>`:''}</div></summary><div class="history-data">`;
            ['cowok','cewek'].forEach(g => {
                html += `<div class="history-col"><h3>${g.toUpperCase()}</h3>`;
                let grouped = {}; (record[g]||[]).forEach((p, idx) => { if(!grouped[p.tugas]) grouped[p.tugas]=[]; grouped[p.tugas].push({...p, oIdx: idx}); });
                (tasks[g] || []).forEach(t => {
                    if(!grouped[t]) return;
                    html += `<div class="history-task-group"><span class="history-task-title">${t}</span>`;
                    grouped[t].forEach(p => {
                        let pres = p.presensi || 'absen';
                        html += `<div class="history-person"><div style="display:flex; justify-content:space-between; align-items:center;"><span><b>${p.nama}</b> <small class="lorong-tag">${p.lorong}</small></span><span id="badge-${record.docId}-${g}-${p.oIdx}" class="badge-presensi badge-${pres.toLowerCase()}">${p.presensi || 'Absen'}</span></div>${isAdmin?`<select class="no-print" onchange="updatePresensi('${record.docId}','${g}',${p.oIdx},this.value)"><option value="" disabled ${!p.presensi?'selected':''}>Set...</option><option value="Hadir" ${p.presensi==='Hadir'?'selected':''}>Hadir</option><option value="Alfa" ${p.presensi==='Alfa'?'selected':''}>Alfa</option><option value="Izin" ${p.presensi==='Izin'?'selected':''}>Izin</option></select>`:''}</div>`;
                    });
                    html += `</div>`;
                });
                html += `</div>`;
            });
            cont.innerHTML += html + `</div></details>`;
        });
        document.getElementById('historyModal').style.display = 'block';
    }
    function tutupRiwayatModal() { document.getElementById('historyModal').style.display = 'none'; }
    function hapusDokumen(id) { if (confirm("Hapus?")) db.collection(`history_ppm${currentPPM}`).doc(id).delete(); }

    function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }

    function prosesSemua() {
        document.getElementById('judulHasil').style.display = 'block';
        ['cowok','cewek'].forEach(g => {
            let pool = []; for (let l in memberData[g]) memberData[g][l].forEach(n => pool.push({ nama: n, lorong: l }));
            shuffle(pool); state[g] = pool.map((p, idx) => ({ ...p, id: idx, tugas: tasks[g][idx % tasks[g].length] }));
            renderResult(g);
        });
    }

    function renderResult(g) {
        let cont = document.getElementById('out' + g.charAt(0).toUpperCase() + g.slice(1));
        cont.innerHTML = `<h3>TUGAS ${g.toUpperCase()}</h3>`;
        let grouped = {}; state[g].forEach(p => { if (!grouped[p.tugas]) grouped[p.tugas] = []; grouped[p.tugas].push(p); });
        for (let t in grouped) {
            let html = `<div class="list-group"><b>${t}</b>`;
            grouped[t].forEach(p => { 
                html += `<div class="item-row"><span><b>${p.nama}</b> <small class="lorong-tag">${p.lorong}</small></span>${isAdmin?`<select onchange="state['${g}'][${p.id}].tugas=this.value; renderResult('${g}')">${tasks[g].map(opt => `<option value="${opt}" ${opt === p.tugas ? 'selected' : ''}>${opt}</option>`).join('')}</select>`:''}</div>`; 
            });
            cont.innerHTML += html + `</div>`;
        }
    }
</script>
</body>
</html>
